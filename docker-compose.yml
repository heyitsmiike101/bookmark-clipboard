services:
  bookmark-clipboard:
    build: .
    # Or pull a prebuilt image instead of building:
    # image: ghcr.io/heyitsmiike101/bookmark-clipboard:latest
    container_name: bookmark-clipboard
    ports:
      - "3000:3000"
    volumes:
      # Persist bookmarks (config.json) and uploaded files on the host.
      # Change the host path on the left if you want a different location.
      - /home/user/Docker/bookmark-clipboard:/data
    restart: unless-stopped
